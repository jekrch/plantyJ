<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <!-- Content Security Policy. Delivered as a meta tag because GitHub Pages
         can't set response headers; that means `frame-ancestors` is ignored
         here (it's header-only) and clickjacking stays unmitigated.

         The point of this policy is the Google OAuth access token: it lives in
         sessionStorage, so any injected script could read it and act on a
         visitor's Drive. Pinning script-src to known origins is what keeps a
         script injection from becoming Drive access.

         `style-src` allows 'unsafe-inline' because React sets style attributes
         directly; style injection is a far smaller problem than script.
         Anything added to the allowlists below widens the token's exposure. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://accounts.google.com/gsi/client https://analytics.jacobkrch.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com/gsi/style;
        font-src 'self' data: https://fonts.gstatic.com;
        img-src 'self' data: blob: https://*.googleusercontent.com https://plantyj-public.jekrch.workers.dev;
        connect-src 'self' https://www.googleapis.com https://plantyj-public.jekrch.workers.dev https://accounts.google.com https://analytics.jacobkrch.com https://api.gbif.org https://api.inaturalist.org https://en.wikipedia.org https://powo.science.kew.org;
        frame-src https://accounts.google.com;
        worker-src 'self';
        base-uri 'self';
        form-action 'self';
        object-src 'none'
      "
    />
    <!-- no-referrer, not strict-origin: Google's Drive image CDN
         (lh3.googleusercontent.com) rate-limits by requesting origin and
         throttles unrecognized ones (esp. localhost) to 429, while serving
         referer-less requests normally. Sending no Referer sidesteps that. No
         app request depends on the Referer header — Drive JSON uses bearer
         tokens and public reads go through the worker proxy — so this is safe
         and privacy-positive. (The one exception, the referer-restricted
         browser API-key fallback for proxy-less public dev, isn't used here.) -->
    <meta name="referrer" content="no-referrer" />

    <!-- Hide the SEO prerender fallback before first paint so it never flashes
         for JS-enabled visitors (React replaces it on mount). It stays in the
         HTML source for crawlers; no-JS visitors get it back via <noscript>. -->
    <style>
      .seo-prerender {
        display: none;
      }
    </style>
    <noscript>
      <style>
        .seo-prerender {
          display: block;
        }
      </style>
    </noscript>

    <title>PlantyJ: A Minnesotan garden journal</title>
    <meta
      name="description"
      content="PlantyJ is a Minnesotan garden journal: a photo gallery of plants, pollinators, and zones, updated from our green spaces. Browse by species, zone, or tag and watch the ecology grow over time."
    />
    <link rel="canonical" href="https://plantyj.com/" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, Slack, iMessage, LinkedIn, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PlantyJ" />
    <meta property="og:title" content="PlantyJ: A Minnesotan garden journal" />
    <meta
      property="og:description"
      content="A Minnesotan garden journal: a photo gallery of plants, pollinators, and zones, updated from our green spaces. Browse by species, zone, or tag and watch the ecology grow over time."
    />
    <meta property="og:url" content="https://plantyj.com/" />
    <meta property="og:image" content="https://plantyj.com/images/T%20can/1777431206.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="960" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PlantyJ: a Minnesotan garden journal" />
    <meta
      name="twitter:description"
      content="A Minnesotan garden journal: a photo gallery of plants, pollinators, and zones, updated from our green spaces. Browse by species, zone, or tag and watch the ecology grow over time."
    />
    <meta name="twitter:image" content="https://plantyj.com/images/T%20can/1777431206.jpg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PlantyJ",
        "alternateName": "PlantyJ garden journal",
        "url": "https://plantyj.com/",
        "description": "A Minnesotan garden journal: a photo gallery of plants, pollinators, and zones, updated from our green spaces."
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <script defer src="https://analytics.jacobkrch.com/script.js" data-website-id="6e97e0f0-ff61-4741-899d-c0371b1944bd"></script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
