name = "plantyj-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
TELEGRAM_ALLOWED_CHAT_ID = "-5285047199"
# Comma-separated Telegram user IDs for Jacob and Jenny (find yours via @userinfobot)
ALLOWED_USER_IDS = "8510422630,8539814055"
GITHUB_REPO = "jekrch/plantyJ"
DATA_BASE_URL = "https://plantyj.com/data"
LLM_MODEL = "gemini-3.1-pro-preview"

# KV namespace for Gemini context-cache state (checksum + cache name).
# To enable caching:
[[kv_namespaces]]
binding = "ASK_CACHE"
id = "6ce8e5b515f140988b9069aafb021e35"
preview_id = "12d42f7ae38e415cb6cea937066906a4"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1