name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/data/**"
      - "public/images/**"
      - "public/CNAME"
      - "scripts/**"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/compute-metadata.yml"
      - ".github/workflows/deploy-frontend.yml"
      - ".github/workflows/deploy-worker.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test
