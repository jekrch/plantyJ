name: Compute metadata & embeddings

on:
  push:
    branches: [main]
    paths:
      - "public/data/pics.json"
      - "public/data/plants.json"
      - "public/data/annotations.json"
      - "public/data/zones.json"
      - "public/data/zone_pics.json"
      - "public/images/**"
      - "scripts/**"
      - ".github/workflows/compute-metadata.yml"
  workflow_dispatch:

concurrency:
  group: compute-metadata
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compute:
    # Skip self-triggered runs from the bot's own metadata-refresh push.
    # Manual dispatch always runs.
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for pending work
        id: guard
        run: python3 scripts/check-pending-work.py

      - name: Set up Python
        if: steps.guard.outputs.any_work == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        if: steps.guard.outputs.any_work == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Cache venv
        if: steps.guard.outputs.any_work == 'true'
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-py3.11-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        if: steps.guard.outputs.any_work == 'true' && steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r scripts/requirements.txt

      - name: Cache HuggingFace + bioclip weights
        if: steps.guard.outputs.needs_embeddings == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/clip
            ~/.local/share/bioclip
          key: ${{ runner.os }}-models-bioclip-v2
          restore-keys: |
            ${{ runner.os }}-models-

      - name: Compute image metadata + species enrichment
        if: steps.guard.outputs.needs_metadata == 'true'
        run: .venv/bin/python scripts/compute-image-metadata.py

      - name: Compute BioCLIP embeddings
        if: steps.guard.outputs.needs_embeddings == 'true'
        run: .venv/bin/python scripts/compute-embeddings.py

      - name: Build rollup
        run: python3 scripts/build-rollup.py

      - name: Commit updated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pics.json public/data/pic-metadata.json public/data/plants.json public/data/embeddings.json public/data/species.json public/data/taxa.json public/data/rollup.min.json
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "chore: refresh plant metadata + embeddings"
            git pull --rebase origin main
            git push
          fi
