name: Compute metadata & embeddings

on:
  push:
    branches: [main]
    paths:
      - "public/data/pics.json"
      - "public/data/plants.json"
      - "public/images/**"
      - "scripts/**"
      - ".github/workflows/compute-metadata.yml"
  workflow_dispatch:

concurrency:
  group: compute-metadata
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace + torchvision weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/clip
          key: ${{ runner.os }}-models-bioclip-v1
          restore-keys: |
            ${{ runner.os }}-models-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Compute image metadata + species enrichment
        run: python scripts/compute-image-metadata.py

      - name: Compute BioCLIP embeddings
        run: python scripts/compute-embeddings.py

      - name: Commit updated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pics.json public/data/plants.json public/data/embeddings.json public/data/species/
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "chore: refresh plant metadata + embeddings"
            git push
          fi
