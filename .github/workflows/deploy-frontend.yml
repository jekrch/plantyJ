name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "vite.config.ts"
      - "tsconfig.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_run:
    workflows: ["Compute metadata & embeddings"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: |
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip-deploy]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        env:
          # Base URL of the worker's public read proxy (a repo variable, e.g.
          # https://plantyj-bot.<account>.workers.dev). Preferred path for
          # reading published gardens; the Drive API key lives as a worker secret.
          VITE_PUBLIC_PROXY_URL: ${{ vars.VITE_PUBLIC_PROXY_URL }}
          # Direct-read fallback key, only used when the proxy URL is unset.
          # Public, referrer-restricted; baked into the bundle. Optional.
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
